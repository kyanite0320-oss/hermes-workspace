<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hermes - 智能新闻聚合平台">
  <title>Hermes · 新闻聚合</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen">

  <!-- ============ HEADER ============ -->
  <header id="header" class="header-glass fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-14 sm:h-16">

        <!-- Logo -->
        <div class="flex items-center gap-2 shrink-0">
          <i data-lucide="newspaper" class="w-5 h-5 sm:w-6 sm:h-6 text-cyan-400"></i>
          <span class="text-lg sm:text-xl font-bold tracking-tight">Hermes</span>
        </div>

        <!-- Desktop Categories -->
        <nav id="catNav" class="hidden md:flex items-center gap-1 mx-4">
          <button class="cat-tab active px-3 py-2 text-sm font-medium" data-cat="all">推荐</button>
          <button class="cat-tab px-3 py-2 text-sm font-medium" data-cat="tech">科技</button>
          <button class="cat-tab px-3 py-2 text-sm font-medium" data-cat="world">国际</button>
          <button class="cat-tab px-3 py-2 text-sm font-medium" data-cat="business">商业</button>
        </nav>

        <!-- Actions -->
        <div class="flex items-center gap-2 sm:gap-3">

          <!-- Search Desktop -->
          <div class="relative hidden sm:block">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 pointer-events-none" style="color:var(--text-muted)"></i>
            <input type="text" id="searchInput"
                   class="search-input pl-9 pr-3 py-1.5 sm:py-2 text-sm w-36 sm:w-44 focus:w-52 lg:focus:w-64 transition-all"
                   placeholder="搜索新闻…" spellcheck="false">
          </div>

          <!-- Mobile Search Toggle -->
          <button id="mobileSearchBtn" class="sm:hidden p-2 rounded-lg hover:bg-slate-700/50 transition-colors">
            <i data-lucide="search" class="w-5 h-5"></i>
          </button>

          <!-- Refresh -->
          <button id="refreshBtn" class="p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="刷新 (R)">
            <i data-lucide="refresh-cw" id="refreshIcon" class="w-4 h-4 sm:w-5 sm:h-5"></i>
          </button>

          <!-- Theme Toggle -->
          <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-700/50 transition-colors" title="切换主题 (D)">
            <i data-lucide="moon" id="themeIcon" class="w-4 h-4 sm:w-5 sm:h-5"></i>
          </button>

        </div>
      </div>

      <!-- Mobile Search (collapsible) -->
      <div id="mobileSearchBar" class="sm:hidden hidden pb-3">
        <div class="relative">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 pointer-events-none" style="color:var(--text-muted)"></i>
          <input type="text" id="mobileSearchInput"
                 class="search-input pl-9 pr-3 py-2 text-sm w-full"
                 placeholder="搜索新闻…" spellcheck="false">
        </div>
      </div>

      <!-- Mobile Categories -->
      <nav id="mobileCatNav" class="md:hidden flex items-center gap-1 pb-3 overflow-x-auto hide-scrollbar">
        <button class="cat-tab active px-3 py-1.5 text-sm font-medium shrink-0" data-cat="all">推荐</button>
        <button class="cat-tab px-3 py-1.5 text-sm font-medium shrink-0" data-cat="tech">科技</button>
        <button class="cat-tab px-3 py-1.5 text-sm font-medium shrink-0" data-cat="world">国际</button>
        <button class="cat-tab px-3 py-1.5 text-sm font-medium shrink-0" data-cat="business">商业</button>
      </nav>
    </div>
  </header>
  <!-- ============ END HEADER ============ -->

  <!-- ============ TICKER ============ -->
  <div id="ticker" class="ticker-wrap border-y mt-14 sm:mt-16">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
  <!-- ============ END TICKER ============ -->

  <!-- ============ MAIN ============ -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-5 sm:py-8">

    <!-- Stats Bar -->
    <div id="statsBar" class="flex flex-wrap items-center justify-between gap-2 mb-5 sm:mb-8 text-xs sm:text-sm">
      <div class="flex items-center gap-3">
        <span id="articleCount" class="text-slate-400">加载中…</span>
        <span id="statusDot" class="status-dot pending"></span>
      </div>
      <div class="flex items-center gap-3 text-slate-500">
        <span id="updateInfo"></span>
        <button id="scrollTopBtn" class="hidden sm:inline-flex items-center gap-1 hover:text-slate-300 transition-colors" title="回到顶部">
          <i data-lucide="arrow-up" class="w-3.5 h-3.5"></i>
          <span class="text-xs" id="refreshCountdown"></span>
        </button>
      </div>
    </div>

    <!-- News Grid -->
    <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5 lg:gap-6">
      <!-- Skeleton will be rendered by JS -->
    </div>

  </main>
  <!-- ============ END MAIN ============ -->

  <!-- ============ FOOTER ============ -->
  <footer class="border-t mt-10 sm:mt-16 py-6 sm:py-8" style="border-color:var(--border-color)">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">

        <!-- Source Status -->
        <div id="sourceStatus" class="flex flex-wrap items-center gap-x-5 gap-y-2 text-xs sm:text-sm"></div>

        <!-- Footer Info -->
        <div class="text-xs sm:text-sm text-slate-600 flex items-center gap-4">
          <span>Hermes · 智能新闻聚合</span>
          <span id="dataMode" class="px-2 py-0.5 rounded text-xs border" style="border-color:var(--border-color);color:var(--text-muted)">Mock</span>
        </div>

      </div>
    </div>
  </footer>
  <!-- ============ END FOOTER ============ -->

  <!-- ============ TOAST ============ -->
  <div id="toastContainer" class="fixed bottom-4 sm:bottom-6 right-4 sm:right-6 z-50 flex flex-col gap-2"></div>

  <!-- ============ SHORTCUTS MODAL ============ -->
  <div id="shortcutsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-[var(--bg-card)] rounded-xl p-6 max-w-sm w-full mx-4 border" style="border-color:var(--border-color)">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold">键盘快捷键</h3>
        <i data-lucide="keyboard" class="w-5 h-5" style="color:var(--text-muted)"></i>
      </div>
      <div class="space-y-2.5 text-sm">
        <div class="flex items-center justify-between"><span>搜索</span><kbd>/</kbd></div>
        <div class="flex items-center justify-between"><span>刷新</span><kbd>R</kbd></div>
        <div class="flex items-center justify-between"><span>上一条新闻</span><kbd>K</kbd></div>
        <div class="flex items-center justify-between"><span>下一条新闻</span><kbd>J</kbd></div>
        <div class="flex items-center justify-between"><span>切换主题</span><kbd>D</kbd></div>
        <div class="flex items-center justify-between"><span>打开新闻</span><kbd>Enter</kbd></div>
        <div class="flex items-center justify-between"><span>回到顶部</span><kbd>G</kbd> <span class="text-xs" style="color:var(--text-muted)">连按两次</span></div>
        <div class="flex items-center justify-between"><span>分类 推荐</span><kbd>1</kbd></div>
        <div class="flex items-center justify-between"><span>分类 科技</span><kbd>2</kbd></div>
        <div class="flex items-center justify-between"><span>分类 国际</span><kbd>3</kbd></div>
        <div class="flex items-center justify-between"><span>分类 商业</span><kbd>4</kbd></div>
        <div class="flex items-center justify-between"><span>关闭弹窗</span><kbd>Esc</kbd></div>
        <div class="pt-2 border-t text-xs text-center" style="border-color:var(--border-color);color:var(--text-muted)">
          按 <kbd>?</kbd> 随时查看帮助
        </div>
      </div>
      <button id="closeShortcuts" class="mt-5 w-full py-2.5 rounded-lg transition-colors text-sm font-medium"
              style="background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-color)">
        关闭
      </button>
    </div>
  </div>
  <!-- ============ END MODAL ============ -->

  <script src="app.js"></script>
</body>
</html>
